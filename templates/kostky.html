<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Kostky Arena</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; text-align: center; }
        #login { position: fixed; top:0; left:0; width:100%; height:100%; background: #111; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .arena { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .player-card { width: 250px; padding: 20px; border-radius: 15px; background: #1a1a1a; border: 4px solid #444; }
        .player-card.active { border-color: #2ecc71; box-shadow: 0 0 20px #2ecc7155; }
        .die { width: 50px; height: 50px; line-height: 50px; background: white; color: black; display: inline-block; margin: 5px; border-radius: 10px; font-weight: bold; font-size: 24px; cursor: pointer; }
        .die.selected { background: #f1c40f; transform: scale(1.1); box-shadow: 0 0 10px #f1c40f; }
        .btn { padding: 12px 24px; margin: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-roll { background: #2ecc71; color: white; }
        .btn-bank { background: #e67e22; color: white; }
        .back { position: absolute; top: 20px; left: 20px; color: #666; text-decoration: none; }
    </style>
</head>
<body>
    <a href="/" class="back">← Zpět do menu</a>
    <h1>🎲 Kostky Arena</h1>
    
    <div id="login">
        <h2>Zadej jméno a hraj:</h2>
        <input type="text" id="nick" style="padding:10px; font-size:18px; border-radius:5px;">
        <button class="btn btn-roll" onclick="join()">VSTOUPIT DO HRY</button>
    </div>

    <h2 id="global-msg" style="color: #f1c40f;"></h2>
    <div id="arena" class="arena"></div>
    
    <div style="margin-top: 50px;">
        <button onclick="socket.emit('reset_game')" style="background:none; border:none; color:#444; cursor:pointer;">Restartovat celou arénu</button>
    </div>

    <script>
        const socket = io();
        function join() {
            const n = document.getElementById('nick').value;
            if(n) { socket.emit('join_game', {name: n}); document.getElementById('login').style.display='none'; }
        }

        socket.on('update', (g) => {
            document.getElementById('global-msg').innerText = g.msg;
            const arena = document.getElementById('arena');
            arena.innerHTML = '';

            g.players.forEach((p, idx) => {
                const isActive = idx === g.turn_index;
                const isMe = p.id === socket.id;
                const card = document.createElement('div');
                card.className = `player-card ${isActive ? 'active' : ''}`;
                
                card.innerHTML = `
                    <h3>${p.name} ${isMe ? '(TY)' : ''}</h3>
                    <div style="font-size: 30px; font-weight: bold;">${g.scores[p.id]}</div>
                    <div style="color: #2ecc71; height: 20px;">${isActive ? 'Právě hraje...' : ''}</div>
                    <hr style="border:0; border-top:1px solid #333; margin: 15px 0;">
                `;

                if (isActive && isMe) {
                    const controls = document.createElement('div');
                    if (g.current_roll.length === 0) {
                        controls.innerHTML = `<button class="btn btn-roll" onclick="socket.emit('roll_dice')">HODIT KOSTKAMI</button>`;
                    } else {
                        const diceBox = document.createElement('div');
                        g.current_roll.forEach((val, i) => {
                            const d = document.createElement('div');
                            d.className = 'die' + (g.selected_indices.includes(i) ? ' selected' : '');
                            d.innerText = val;
                            d.onclick = () => socket.emit('select_die', {index: i});
                            diceBox.appendChild(d);
                        });
                        controls.appendChild(diceBox);
                        controls.innerHTML += `<button class="btn btn-roll" style="background:#3498db" onclick="socket.emit('keep_dice')">POTVRDIT KOSTKY</button>`;
                    }
                    if (g.current_turn_pts >= 350) {
                        controls.innerHTML += `<br><button class="btn btn-bank" onclick="socket.emit('bank_points')">ZAPSAT ${g.current_turn_pts} BODŮ</button>`;
                    }
                    card.appendChild(controls);
                } else if (isActive) {
                    // Cizí kostky
                    const diceBox = document.createElement('div');
                    g.current_roll.forEach((val, i) => {
                        const d = document.createElement('div');
                        d.className = 'die' + (g.selected_indices.includes(i) ? ' selected' : '');
                        d.innerText = val;
                        diceBox.appendChild(d);
                    });
                    card.appendChild(diceBox);
                }
                arena.appendChild(card);
            });
        });

        socket.on('reload', () => location.reload());
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Prší Arena</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root { --gold: #c5a059; --dark-green: #0a2f1a; --parchment: #e8dfc8; }
        body { background-color: #1a1a1a; color: white; font-family: 'Palatino', serif; margin: 0; text-align: center; }
        
        /* Styl tvých karet */
        .card {
            width: 140px; height: 220px; background: var(--parchment);
            border: 4px solid var(--dark-green); border-radius: 8px;
            position: relative; display: inline-block; margin: 5px; cursor: pointer; color: var(--dark-green);
        }
        .card.pc { background: #2c3e50; border-color: #ecf0f1; }
        .label { position: absolute; font-size: 18px; font-weight: bold; }
        .label-tl { top: 10px; left: 10px; }
        .label-br { bottom: 10px; right: 10px; transform: rotate(180deg); }
        .symbol { position: absolute; width: 20px; height: 20px; background-size: contain; }
        
        /* Barvy - předpokládá obrázky ve stejné složce */
        .srdce .symbol { background-color: red; border-radius: 50%; } /* Placeholder pro barvy */
        .list .symbol { background-color: green; border-radius: 50%; }
        .zalud .symbol { background-color: brown; border-radius: 50%; }
        .koule .symbol { background-color: orange; border-radius: 50%; }

        .arena { height: 100vh; display: flex; flex-direction: column; justify-content: space-around; }
        .controls { background: rgba(0,0,0,0.5); padding: 20px; }
        #color-picker { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #333; padding: 20px; border: 2px solid gold; z-index: 1000; }
        .color-btn { width: 50px; height: 50px; cursor: pointer; border: none; margin: 5px; }
    </style>
</head>
<body>

    <div id="color-picker">
        <h3>Vyber barvu (Svršek):</h3>
        <button class="color-btn" style="background:red" onclick="pickColor('srdce')"></button>
        <button class="color-btn" style="background:green" onclick="pickColor('list')"></button>
        <button class="color-btn" style="background:brown" onclick="pickColor('zalud')"></button>
        <button class="color-btn" style="background:orange" onclick="pickColor('koule')"></button>
    </div>

    <div class="arena">
        <div id="pc-hand"></div>
        
        <div class="table">
            <h2 id="status">Hra se načítá...</h2>
            <div id="deck" class="card pc" onclick="draw()">BALÍČEK</div>
            <div id="stack" style="display:inline-block"></div>
        </div>

        <div id="player-hand"></div>
    </div>

    <script>
        const socket = io();
        let pendingIdx = null;

        function createCard(card, isPlayer) {
            if(!isPlayer) return '<div class="card pc"></div>';
            return `
                <div class="card ${card.b}" onclick="playCard(${card.idx}, '${card.h}')">
                    <div class="label label-tl">${card.h}</div>
                    <div class="symbol" style="top:10px; right:10px"></div>
                    <div style="margin-top:80px; font-size:12px">${card.b}</div>
                    <div class="label label-br">${card.h}</div>
                </div>`;
        }

        socket.on('update_prsi', (g) => {
            document.getElementById('status').innerText = g.msg + (g.penalty > 0 ? ` (Bereš ${g.penalty})` : "");
            
            const stack = document.getElementById('stack');
            stack.innerHTML = createCard(g.stack_top, true);
            if(g.current_color !== g.stack_top.b) {
                stack.innerHTML += `<p>Změněno na: ${g.current_color}</p>`;
            }

            const pHand = document.getElementById('player-hand');
            pHand.innerHTML = g.player_hand.map((c, i) => createCard({...c, idx: i}, true)).join('');

            const pcHand = document.getElementById('pc-hand');
            pcHand.innerHTML = Array(g.pc_hand_count).fill(createCard(null, false)).join('');
        });

        function playCard(idx, val) {
            if(val === 'V') {
                pendingIdx = idx;
                document.getElementById('color-picker').style.display = 'block';
            } else {
                socket.emit('prsi_play', {idx: idx});
            }
        }

        function pickColor(color) {
            socket.emit('prsi_play', {idx: pendingIdx, color: color});
            document.getElementById('color-picker').style.display = 'none';
        }

        function draw() { socket.emit('prsi_draw'); }

        socket.emit('request_prsi_update');
    </script>
</body>
</html>
